services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: django_db
      POSTGRES_USER: django_user
      POSTGRES_PASSWORD: django_password
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile-backend
    env_file:
      - ../.env
    environment:
      DB_NAME: django_db
      DB_USER: django_user
      DB_PASSWORD: django_password
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/django/backend
      - media_data:/django/backend/media
      - ../backend/media/source:/django/backend/media/source

  celery-worker:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile-backend
    env_file:
      - ../.env
    environment:
      DB_NAME: django_db
      DB_USER: django_user
      DB_PASSWORD: django_password
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
    working_dir: /django/backend
    volumes:
      - ../backend:/django/backend
      - media_data:/django/backend/media
      - ../backend/media/source:/django/backend/media/source
    command: celery -A testbackend.celery_app worker --loglevel=INFO

  frontend:
    build:
      context: ../
      dockerfile: ./docker/Dockerfile-frontend
    environment:
      - VITE_API_BASE=http://localhost:8000
    depends_on:
      - backend
    ports:
      - "4200:4200"
    volumes:
      - ../frontend/src:/app/src
      - ../frontend/index.html:/app/index.html
      - ../frontend/vite.config.ts:/app/vite.config.ts
      - ../frontend/tsconfig.json:/app/tsconfig.json
      - ../frontend/tsconfig.node.json:/app/tsconfig.node.json

volumes:
  pg_data:
  media_data: